<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#080c18;color:#e8eaf0;font-family:'DM Sans','Segoe UI',system-ui,sans-serif}
::placeholder{color:rgba(255,255,255,0.25)}
a{color:inherit;text-decoration:none}
input,select,button{font-family:inherit}
.nav{position:sticky;top:0;z-index:100;background:rgba(8,12,24,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 24px}
.nav-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:6px;height:52px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-logo{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:16px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.nl{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;border:none;background:none;transition:all 0.15s;white-space:nowrap}
.nl:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.04)}
.nl.on{color:#FFD700;background:rgba(255,215,0,0.08)}
.ld{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.ld-s{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#FFD700;border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-t{font-size:13px;color:rgba(255,255,255,0.3)}
tr:hover td{background:rgba(255,255,255,0.025)!important}
.fb{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s}
.fb:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}.fb.on{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.3);color:#FFD700}
.xb{padding:6px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.45);cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.xb:hover{background:rgba(99,179,237,0.1);border-color:rgba(99,179,237,0.3);color:#63b3ed}
.tt{padding:10px 20px;border:none;background:transparent;color:rgba(255,255,255,0.4);cursor:pointer;font-size:13px;font-weight:600;position:relative;white-space:nowrap}
.tt:hover{color:rgba(255,255,255,0.7)}.tt.on{color:#FFD700}.tt.on::after{content:"";position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:#FFD700;border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi 0.3s ease both}
@media(max-width:768px){.fg{flex-direction:column!important}.g2{grid-template-columns:1fr!important}}
</style>
</head>

<script type="text/babel" data-type="module">
const {useState,useEffect,useMemo,useCallback,useRef}=React;

// ── Data ──
const DC={};
async function LD(n){if(DC[n])return DC[n];const r=await fetch(`data/${n}.json`);DC[n]=await r.json();return DC[n];}
function Loader({t}){return <div className="ld"><div className="ld-s"/><div className="ld-t">{t||"Loading…"}</div></div>}

// ── Shared ──
const SN=["GF","SF1","SF2","MPQ"],SC={"GF":"#FFD700","SF1":"#63b3ed","SF2":"#a78bfa","MPQ":"#f687b3"};
function PB({p,s}){if(!p)return<span style={{color:"rgba(255,255,255,0.15)"}}>—</span>;const m={1:"#FFD700",2:"#C0C0C0",3:"#CD7F32"};if(m[p])return<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:"50%",fontWeight:700,fontSize:12,background:m[p],color:"#0a0e1a"}}>{p}</span>;if((s==="GF"||s===0)&&p>=4&&p<=6)return<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:"50%",fontWeight:700,fontSize:12,background:"rgba(99,179,237,0.2)",border:"1.5px solid rgba(99,179,237,0.5)",color:"#63b3ed"}}>{p}</span>;return<span style={{color:"rgba(255,255,255,0.4)"}}>{p}</span>;}
function SB({s}){const n=typeof s==="number"?SN[s]:s;return<span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,letterSpacing:"0.5px",background:SC[n]||"rgba(255,255,255,0.1)",color:n==="GF"?"#0a0e1a":"#fff",opacity:n==="GF"?1:0.85}}>{n}</span>;}
function PL(){return<div style={{fontSize:12,color:"rgba(255,255,255,0.22)",display:"flex",gap:12,flexWrap:"wrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:"50%",background:"#FFD700"}}/>Winner</span><span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:"50%",background:"#C0C0C0"}}/>2nd</span><span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:"50%",background:"#CD7F32"}}/>3rd</span><span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:"50%",border:"1.5px solid #63b3ed",background:"rgba(99,179,237,0.2)"}}/>PQ (4–6)</span></div>;}
function Pg({p,t,set}){if(t<=1)return null;return<div style={{display:"flex",justifyContent:"center",gap:6,marginTop:16,flexWrap:"wrap"}}>{[["«",()=>set(0),p===0],["‹",()=>set(x=>x-1),p===0]].map(([l,fn,d],i)=><button key={i} disabled={d} onClick={fn} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(255,255,255,0.4)",cursor:d?"default":"pointer",fontSize:12,fontWeight:600,opacity:d?0.25:1}}>{l}</button>)}{Array.from({length:Math.min(t,7)},(_,i)=>{let pg;if(t<=7)pg=i;else if(p<3)pg=i;else if(p>t-4)pg=t-7+i;else pg=p-3+i;return<button key={pg} onClick={()=>set(pg)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+(p===pg?"rgba(255,215,0,0.25)":"rgba(255,255,255,0.06)"),background:p===pg?"rgba(255,215,0,0.12)":"transparent",color:p===pg?"#FFD700":"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:12,fontWeight:600}}>{pg+1}</button>})}{[["›",()=>set(x=>x+1),p>=t-1],["»",()=>set(t-1),p>=t-1]].map(([l,fn,d],i)=><button key={i+10} disabled={d} onClick={fn} style={{padding:"4px 10px",borderRadius:6,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(255,255,255,0.4)",cursor:d?"default":"pointer",fontSize:12,fontWeight:600,opacity:d?0.25:1}}>{l}</button>)}</div>;}
function NP({nations,sel,onSel,label,color="#63b3ed"}){const[q,setQ]=useState("");const[open,setOpen]=useState(false);const ref=useRef(null);useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);const fl=useMemo(()=>nations.filter(n=>(typeof n==="string"?n:n[0]).toLowerCase().includes(q.toLowerCase())).slice(0,40),[nations,q]);const getName=n=>typeof n==="string"?n:n[0];return<div ref={ref} style={{position:"relative",flex:"1 1 200px"}}>{label&&<div style={{fontSize:11,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{label}</div>}<input value={open?q:(sel||"")} onFocus={()=>{setOpen(true);setQ("")}} onChange={e=>{setQ(e.target.value);setOpen(true)}} placeholder="Select nation…" style={{width:"100%",padding:"10px 14px",borderRadius:8,fontSize:14,fontWeight:600,background:"rgba(255,255,255,0.04)",border:`1px solid ${sel?color+"44":"rgba(255,255,255,0.08)"}`,color:sel?color:"#e8eaf0"}}/>{open&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,marginTop:4,maxHeight:260,overflowY:"auto",borderRadius:8,background:"#141826",border:"1px solid rgba(255,255,255,0.1)",boxShadow:"0 12px 40px rgba(0,0,0,0.6)"}}>{sel&&<div onClick={()=>{onSel(null);setOpen(false)}} style={{padding:"8px 14px",fontSize:12,color:"rgba(255,255,255,0.3)",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.06)"}} onMouseEnter={e=>e.target.style.background="rgba(255,255,255,0.04)"} onMouseLeave={e=>e.target.style.background="transparent"}>Clear</div>}{fl.map(n=>{const name=getName(n);return<div key={name} onClick={()=>{onSel(name);setOpen(false);setQ("")}} style={{padding:"8px 14px",fontSize:13,color:"rgba(255,255,255,0.7)",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}} onMouseEnter={e=>e.target.style.background="rgba(255,255,255,0.05)"} onMouseLeave={e=>e.target.style.background="transparent"}>{typeof n==="string"?n:<><span>{n[0]}</span><span style={{float:"right",fontSize:11,color:"rgba(255,255,255,0.3)"}}>{n[1]} GF{n[2]>0?` · ${n[2]}🏆`:""}</span></>}</div>})}</div>}</div>;}
const ytL=yt=>{if(!yt)return null;const url=yt.startsWith("http")?yt:`https://www.youtube.com/watch?v=${yt}`;return<a href={url} target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.3)",fontSize:15}} onMouseEnter={e=>e.target.style.color="#ff4444"} onMouseLeave={e=>e.target.style.color="rgba(255,255,255,0.3)"}>▶</a>;};

// ══════════════════════════════════════
// HOMEPAGE
// ══════════════════════════════════════
function HomePage(){const[d,setD]=useState(null);useEffect(()=>{LD("homepage").then(setD)},[]);if(!d)return<Loader/>;const s=d.s;return<div style={{maxWidth:1100,margin:"0 auto",padding:"24px"}}><div style={{position:"relative",padding:"28px 32px",background:"linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,165,0,0.03))",border:"1px solid rgba(255,215,0,0.12)",borderRadius:16,marginBottom:28,overflow:"hidden"}}><div style={{position:"absolute",top:-20,right:-10,fontSize:100,opacity:0.04,pointerEvents:"none"}}>🏆</div><div style={{fontSize:11,fontWeight:600,color:"#FFD700",letterSpacing:3,textTransform:"uppercase",marginBottom:8}}>Latest Winner — Edition #{s.le}</div><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(24px,4vw,34px)",fontWeight:900,color:"#fff"}}>{s.lw}</div><div style={{fontSize:15,color:"rgba(255,255,255,0.6)",marginTop:4}}>{s.la} — <em>"{s.ls}"</em></div><div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,215,0,0.12)",border:"1px solid rgba(255,215,0,0.25)",borderRadius:20,padding:"4px 14px",fontSize:14,fontWeight:700,color:"#FFD700"}}>🏆 {s.lp} points</div></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:32}}>{[[s.te,"Editions"],[s.tn,"Nations"],[s.gf,"GF Entries"],[s.ua,"Artists"],[s.hs,"Record Score"],[s.us,"Songs"]].map(([v,l])=><div key={l} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"18px 16px",textAlign:"center"}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:28,fontWeight:800,background:"linear-gradient(135deg,#63b3ed,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{(v||0).toLocaleString()}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:1.5,marginTop:4}}>{l}</div></div>)}</div><div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:28}}><div><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:800,marginBottom:14}}>Most Successful Nations</div>{d.tn.slice(0,10).map((n,i)=><div key={n.n} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}><span style={{width:120,fontSize:13,color:"rgba(255,255,255,0.8)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.n}</span><div style={{flex:1,height:22,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden",position:"relative"}}><div style={{height:"100%",borderRadius:4,width:`${(n.w/d.tn[0].w)*100}%`,background:i===0?"linear-gradient(90deg,#FFD700,#FFA500)":i<3?"linear-gradient(90deg,#C0C0C0,#8a8a8a)":"linear-gradient(90deg,rgba(99,179,237,0.6),rgba(99,179,237,0.2))"}}/><span style={{position:"absolute",right:8,top:2,fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.7)"}}>{n.w}</span></div></div>)}</div><div><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:800,marginBottom:14}}>Recent Winners</div>{d.rw.slice(0,12).map(w=><div key={w.e} style={{display:"grid",gridTemplateColumns:"42px 1fr 50px",padding:"6px 8px",borderBottom:"1px solid rgba(255,255,255,0.03)"}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:16,fontWeight:800,color:"rgba(255,255,255,0.25)"}}>#{w.e}</div><div><div style={{fontSize:13,fontWeight:600}}>{w.n}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{w.a}</div></div><div style={{textAlign:"right",fontSize:14,fontWeight:700,color:"#63b3ed"}}>{w.p}</div></div>)}</div></div></div>;}

// ══════════════════════════════════════
// DATABASE
// ══════════════════════════════════════
function DatabasePage(){const[d,setD]=useState(null);const[q,setQ]=useState("");const[pg,setPg]=useState(0);const[sc,setSc]=useState("edition");const[sd,setSd]=useState("desc");useEffect(()=>{LD("database").then(r=>{setD(r.map(r=>({edition:r[0],sub:SN[r[1]],draw:r[2],nation:r[3],artist:r[4],song:r[5],place:r[6],points:r[7],yt:r[8]})))})},[]);if(!d)return<Loader t="Loading 18,807 entries…"/>;const PS=50;const qs=q.toLowerCase().trim();const fl=useMemo(()=>{let rows=d;if(qs)rows=rows.filter(r=>r.artist.toLowerCase().includes(qs)||r.song.toLowerCase().includes(qs)||r.nation.toLowerCase().includes(qs));return[...rows].sort((a,b)=>{let va=a[sc],vb=b[sc];if(va==null)return 1;if(vb==null)return-1;if(typeof va==="string"){va=va.toLowerCase();vb=(vb||"").toLowerCase();}return sd==="asc"?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0)})},[d,qs,sc,sd]);const tp=Math.ceil(fl.length/PS);const rows=fl.slice(pg*PS,(pg+1)*PS);const sort=c=>{if(sc===c)setSd(x=>x==="asc"?"desc":"asc");else{setSc(c);setSd(c==="edition"?"desc":"asc")}setPg(0)};const TH=({c,l,w,a})=><th onClick={()=>sort(c)} style={{width:w,cursor:"pointer",padding:"10px 8px",fontSize:11,fontWeight:600,color:sc===c?"#FFD700":"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.8px",textAlign:a||"left",borderBottom:"1px solid rgba(255,255,255,0.08)",whiteSpace:"nowrap"}}>{l}{sc===c?(sd==="asc"?" ↑":" ↓"):""}</th>;const hl=t=>{if(!qs||!t)return t;const i=t.toLowerCase().indexOf(qs);if(i===-1)return t;return<>{t.slice(0,i)}<span style={{background:"rgba(255,215,0,0.2)",borderRadius:2,padding:"0 1px"}}>{t.slice(i,i+qs.length)}</span>{t.slice(i+qs.length)}</>};const xCSV=()=>{const h="Edition,Subevent,Draw,Nation,Artist,Song,Place,Points,YouTube\n";const esc=s=>(s||"").split('"').join('""');const b=fl.map(r=>[r.edition,r.sub,r.draw||"",'"'+esc(r.nation)+'"','"'+esc(r.artist)+'"','"'+esc(r.song)+'"',r.place||"",r.points||"",r.yt?(r.yt.startsWith("http")?r.yt:"https://www.youtube.com/watch?v="+r.yt):""].join(",")).join("\n");const bl=new Blob(["\uFEFF"+h+b],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="nsc_export.csv";a.click()};return<div style={{maxWidth:1200,margin:"0 auto",padding:"24px"}}><h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(24px,4vw,34px)",fontWeight:900,background:"linear-gradient(135deg,#fff,#FFD700)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>NSC Database</h1><p style={{fontSize:13,color:"rgba(255,255,255,0.35)",marginBottom:8}}>{d.length.toLocaleString()} entries · All editions</p><PL/><input type="text" placeholder="Search by artist, song, or nation…" value={q} onChange={e=>{setQ(e.target.value);setPg(0)}} style={{width:"100%",padding:"12px 16px",borderRadius:10,fontSize:15,fontWeight:500,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#e8eaf0",marginTop:14,marginBottom:14}}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:13,color:"rgba(255,255,255,0.3)"}}>{fl.length.toLocaleString()} entries{qs&&<> matching "<span style={{color:"#FFD700"}}>{q}</span>"</>}</span><div style={{display:"flex",gap:8,alignItems:"center"}}>{fl.length>0&&<button className="xb" onClick={xCSV}>Export CSV</button>}{tp>1&&<span style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>Page {pg+1}/{tp}</span>}</div></div><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 1px",minWidth:800}}><thead><tr><TH c="edition" l="Ed." w={48}/><TH c="sub" l="Sub" w={52}/><TH c="draw" l="#" w={36} a="center"/><TH c="nation" l="Nation"/><TH c="artist" l="Artist"/><TH c="song" l="Song"/><th style={{width:30,padding:"10px 4px",borderBottom:"1px solid rgba(255,255,255,0.08)",fontSize:11,color:"rgba(255,255,255,0.2)",textAlign:"center"}}>♫</th><TH c="place" l="Place" w={50} a="center"/><TH c="points" l="Pts" w={46} a="right"/></tr></thead><tbody>{rows.length===0?<tr><td colSpan={9} style={{padding:48,textAlign:"center",color:"rgba(255,255,255,0.2)"}}>No entries match your search.</td></tr>:rows.map((r,i)=><tr key={`${r.edition}-${r.sub}-${r.nation}-${i}`}><td style={{padding:"7px 8px",fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.25)",fontFamily:"'Playfair Display',Georgia,serif"}}>{r.edition}</td><td style={{padding:"7px 8px"}}><SB s={r.sub}/></td><td style={{padding:"7px 6px",fontSize:12,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>{r.draw||""}</td><td style={{padding:"7px 8px",fontSize:13,fontWeight:600,color:"#e8eaf0",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hl(r.nation)}</td><td style={{padding:"7px 8px",fontSize:13,color:"rgba(255,255,255,0.65)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hl(r.artist)}</td><td style={{padding:"7px 8px",fontSize:13,color:"rgba(255,255,255,0.45)",fontStyle:"italic",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hl(r.song)}</td><td style={{padding:"7px 4px",textAlign:"center"}}>{ytL(r.yt)}</td><td style={{padding:"7px 8px",textAlign:"center"}}><PB p={r.place} s={r.sub}/></td><td style={{padding:"7px 8px",fontSize:13,fontWeight:600,textAlign:"right",color:r.place===1?"#FFD700":r.points?"rgba(255,255,255,0.45)":"rgba(255,255,255,0.12)"}}>{r.points||"—"}</td></tr>)}</tbody></table></div><Pg p={pg} t={tp} set={setPg}/></div>;}

// ══════════════════════════════════════

function VotingPage(){const[D,setD]=useState(null);const[sel,setSel]=useState(null);const[cmp,setCmp]=useState(null);const[view,setView]=useState("explorer");const[edFrom,setEdFrom]=useState(188);const[edTo,setEdTo]=useState(238);const[minEd,setMinEd]=useState(5);const[allPairs,setAllPairs]=useState(null);const[computing,setComputing]=useState(false);useEffect(()=>{LD("voting").then(d=>{setD(d);setEdFrom(d.e[0]);setEdTo(d.e[1]);const trollIdx=d.n.indexOf("Trollheimr");setSel(trollIdx>=0?trollIdx:0)})},[]);if(!D)return<Loader t="Loading voting data…"/>;const MAX=448;const{RM,RV,AE}=useMemo(()=>{const RM=new Map(),RV=new Map();for(const[ed,cat,vi,pairs]of D.r){const key=ed+"_"+cat+"_"+vi;const m=new Map();for(let i=0;i<pairs.length;i+=2)m.set(pairs[i],pairs[i+1]);RM.set(key,m);const rk=ed+"_"+cat;if(!RV.has(rk))RV.set(rk,[]);RV.get(rk).push(vi);}const AE=[...new Set(D.r.map(r=>r[0]))].sort((a,b)=>a-b);return{RM,RV,AE}},[D]);const csim=(v1,v2)=>{let ts=0,cnt=0;for(const ed of AE){if(ed<edFrom||ed>edTo)continue;for(const cat of[0,1]){const m1=RM.get(`${ed}_${cat}_${v1}`),m2=RM.get(`${ed}_${cat}_${v2}`);if(!m1||!m2)continue;let sc=0;for(const[ni,p1]of m1){const p2=m2.get(ni);if(p2)sc+=p1*p2;}ts+=sc/MAX;cnt++;}}return cnt>=minEd?{s:Math.round((ts/cnt)*1000)/10,n:cnt}:null;};const pairSim=useMemo(()=>sel!=null&&cmp!=null?csim(sel,cmp):null,[sel,cmp,edFrom,edTo,minEd]);const nTop=useMemo(()=>{if(sel==null)return[];const r=[];for(let j=0;j<D.n.length;j++){if(j===sel)continue;const s=csim(sel,j);if(s)r.push({i:j,...s});}r.sort((a,b)=>b.s-a.s);return r.slice(0,10);},[sel,edFrom,edTo,minEd]);const cTop=useMemo(()=>{if(cmp==null)return[];const r=[];for(let j=0;j<D.n.length;j++){if(j===cmp)continue;const s=csim(cmp,j);if(s)r.push({i:j,...s});}r.sort((a,b)=>b.s-a.s);return r.slice(0,10);},[cmp,edFrom,edTo,minEd]);const doAll=useCallback(()=>{setComputing(true);setTimeout(()=>{const active=new Map();for(const ed of AE){if(ed<edFrom||ed>edTo)continue;for(const cat of[0,1]){const vs=RV.get(`${ed}_${cat}`)||[];for(const vi of vs)active.set(vi,(active.get(vi)||0)+1);}}const avs=[...active.entries()].filter(([_,c])=>c>=minEd).map(([vi])=>vi).sort((a,b)=>a-b);const pairs=[];for(let i=0;i<avs.length;i++)for(let j=i+1;j<avs.length;j++){const r=csim(avs[i],avs[j]);if(r)pairs.push({a:avs[i],b:avs[j],...r});}pairs.sort((a,b)=>b.s-a.s);setAllPairs(pairs);setComputing(false)},50)},[edFrom,edTo,minEd]);const xCSV=()=>{if(!allPairs)return;const h="Voter 1,Voter 2,Similarity %,Shared Editions\n";const b=allPairs.map(p=>`"${D.n[p.a]}","${D.n[p.b]}",${p.s},${p.n}`).join("\n");const bl=new Blob(["\uFEFF"+h+b],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="nsc_voting_similarity.csv";a.click()};const SimBar=({v})=>{const c=v>60?"#FFD700":v>40?"#63b3ed":"rgba(255,255,255,0.4)";return<div style={{width:"100%",height:8,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden"}}><div style={{width:`${Math.min(100,v)}%`,height:"100%",borderRadius:4,background:c,opacity:0.7}}/></div>};const PtsBar=({v,mx,c="#63b3ed"})=><div style={{width:"100%",height:6,background:"rgba(255,255,255,0.04)",borderRadius:3,overflow:"hidden"}}><div style={{width:`${Math.min(100,(v/Math.max(mx,1))*100)}%`,height:"100%",borderRadius:3,background:c,opacity:0.6}}/></div>;const loveFor=fi=>D.l.filter(l=>l[0]===fi).sort((a,b)=>b[2]-a[2]).slice(0,8).map(l=>({to:l[1],t:l[2],c:l[3]}));const loveFrom=ti=>D.l.filter(l=>l[1]===ti).sort((a,b)=>b[2]-a[2]).slice(0,8).map(l=>({fr:l[0],t:l[2],c:l[3]}));const NPanel=({idx,top,color})=>{if(idx==null)return null;const tgt=loveFor(idx),src=loveFrom(idx);return<div><h3 style={{fontSize:16,fontWeight:700,color,marginBottom:16}}>{D.n[idx]}</h3><div style={{marginBottom:20}}><div style={{fontSize:12,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Most Similar Voters</div>{top.slice(0,8).map((r,i)=><div key={r.i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><span style={{width:16,fontSize:12,fontWeight:700,color:i<3?["#FFD700","#C0C0C0","#CD7F32"][i]:"rgba(255,255,255,0.25)",textAlign:"right"}}>{i+1}</span><span style={{width:110,fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{D.n[r.i]}</span><div style={{flex:1}}><SimBar v={r.s}/></div><span style={{width:48,fontSize:12,fontWeight:700,color,textAlign:"right"}}>{r.s}%</span></div>)}</div><div style={{marginBottom:20}}><div style={{fontSize:12,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Most Points Given To</div>{tgt.map((x,i)=><div key={x.to} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{width:16,fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.25)",textAlign:"right"}}>{i+1}</span><span style={{width:110,fontSize:13,color:"rgba(255,255,255,0.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{D.n[x.to]}</span><div style={{flex:1}}><PtsBar v={x.t} mx={tgt[0]?.t||1} c={color}/></div><span style={{width:50,fontSize:12,color:"rgba(255,255,255,0.4)",textAlign:"right"}}>{x.t} ({x.c}×)</span></div>)}</div><div><div style={{fontSize:12,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Most Points Received From</div>{src.map((x,i)=><div key={x.fr} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{width:16,fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.25)",textAlign:"right"}}>{i+1}</span><span style={{width:110,fontSize:13,color:"rgba(255,255,255,0.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{D.n[x.fr]}</span><div style={{flex:1}}><PtsBar v={x.t} mx={src[0]?.t||1} c={color}/></div><span style={{width:50,fontSize:12,color:"rgba(255,255,255,0.4)",textAlign:"right"}}>{x.t} ({x.c}×)</span></div>)}</div></div>};const ni=D.n.map((_,i)=>i);return<div style={{maxWidth:1100,margin:"0 auto",padding:"24px"}}><h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(24px,4vw,34px)",fontWeight:900,background:"linear-gradient(135deg,#fff,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>Voting Analysis</h1><p style={{fontSize:13,color:"rgba(255,255,255,0.35)",marginBottom:4}}>{D.n.length} nations · Editions {D.e[0]}–{D.e[1]}</p><p style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginBottom:12}}>Similarity = avg(Σ(pts₁ × pts₂) / 448) per edition. Computed live in your browser.</p><div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}><span style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>Editions</span><input type="number" value={edFrom} onChange={e=>{setEdFrom(Number(e.target.value));setAllPairs(null)}} style={{width:60,padding:"6px 8px",borderRadius:6,fontSize:13,textAlign:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#e8eaf0"}}/><span style={{color:"rgba(255,255,255,0.15)"}}>to</span><input type="number" value={edTo} onChange={e=>{setEdTo(Number(e.target.value));setAllPairs(null)}} style={{width:60,padding:"6px 8px",borderRadius:6,fontSize:13,textAlign:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#e8eaf0"}}/><span style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginLeft:8}}>Min. shared</span><input type="number" value={minEd} onChange={e=>{setMinEd(Number(e.target.value)||1);setAllPairs(null)}} style={{width:50,padding:"6px 8px",borderRadius:6,fontSize:13,textAlign:"center",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",color:"#e8eaf0"}}/></div><div style={{borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:2,marginBottom:16}}>{[["explorer","Nation Explorer"],["leaderboard","All Pairs"]].map(([k,l])=><button key={k} className={`tt ${view===k?"on":""}`} onClick={()=>setView(k)}>{l}</button>)}</div>{view==="explorer"&&<div className="fi"><div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:24}}><NP nations={ni.map(i=>D.n[i])} sel={sel!=null?D.n[sel]:null} onSel={n=>{setSel(n?D.n.indexOf(n):null)}} label="Primary Nation" color="#63b3ed"/><NP nations={ni.map(i=>D.n[i])} sel={cmp!=null?D.n[cmp]:null} onSel={n=>{setCmp(n?D.n.indexOf(n):null)}} label="Compare With" color="#a78bfa"/></div>{sel!=null&&cmp!=null&&<div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"24px 28px",marginBottom:24,textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:16}}><span style={{fontSize:18,fontWeight:700,color:"#63b3ed"}}>{D.n[sel]}</span><span style={{color:"rgba(255,255,255,0.2)"}}>↔</span><span style={{fontSize:18,fontWeight:700,color:"#a78bfa"}}>{D.n[cmp]}</span></div><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:44,fontWeight:900,color:pairSim?(pairSim.s>60?"#FFD700":pairSim.s>40?"#63b3ed":"rgba(255,255,255,0.5)"):"rgba(255,255,255,0.2)"}}>{pairSim?`${pairSim.s}%`:"N/A"}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>VOTING SIMILARITY{pairSim&&` · ${pairSim.n} shared editions`}</div></div>}<div className="g2" style={{display:"grid",gridTemplateColumns:cmp!=null?"1fr 1fr":"1fr",gap:20}}>{sel!=null&&<NPanel idx={sel} top={nTop} color="#63b3ed"/>}{cmp!=null&&<NPanel idx={cmp} top={cTop} color="#a78bfa"/>}</div></div>}{view==="leaderboard"&&<div className="fi"><div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}><button className="xb" onClick={doAll} disabled={computing}>{computing?"Computing…":"Compute All Pairs"}</button>{allPairs&&<button className="xb" onClick={xCSV}>Export CSV ({allPairs.length} pairs)</button>}</div>{!allPairs&&!computing&&<div style={{padding:32,textAlign:"center",color:"rgba(255,255,255,0.25)"}}>Click "Compute All Pairs" to generate the full similarity matrix.</div>}{computing&&<div style={{padding:32,textAlign:"center",color:"rgba(255,215,0,0.5)"}}>Computing…</div>}{allPairs&&<table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 2px"}}><thead><tr>{["#","Nation A","Nation B","Similarity","Ed."].map((h,i)=><th key={h} style={{padding:"10px 12px",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",textAlign:i>=3?"center":"left",borderBottom:"1px solid rgba(255,255,255,0.08)",width:[36,null,null,160,60][i]}}>{h}</th>)}</tr></thead><tbody>{allPairs.slice(0,100).map((p,i)=><tr key={`${p.a}-${p.b}`} style={{cursor:"pointer"}} onClick={()=>{setSel(p.a);setCmp(p.b);setView("explorer")}}><td style={{padding:"8px 12px",fontSize:13,fontWeight:700,color:i<3?["#FFD700","#C0C0C0","#CD7F32"][i]:"rgba(255,255,255,0.25)",borderRadius:"8px 0 0 8px"}}>{i+1}</td><td style={{padding:"8px 12px",fontSize:13,fontWeight:600,color:"#63b3ed"}}>{D.n[p.a]}</td><td style={{padding:"8px 12px",fontSize:13,fontWeight:600,color:"#a78bfa"}}>{D.n[p.b]}</td><td style={{padding:"8px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><SimBar v={p.s}/><span style={{fontWeight:700,fontSize:13,color:p.s>60?"#FFD700":"#63b3ed",minWidth:48,textAlign:"right"}}>{p.s}%</span></div></td><td style={{padding:"8px 12px",textAlign:"center",fontSize:13,color:"rgba(255,255,255,0.4)",borderRadius:"0 8px 8px 0"}}>{p.n}</td></tr>)}</tbody></table>}</div>}</div>;}

function App(){const[pg,setPg]=useState("home");const pages=[{id:"home",l:"Overview",C:HomePage},{id:"database",l:"Database",C:DatabasePage},{id:"editions",l:"Editions",C:EditionPage},{id:"nations",l:"Nations",C:NationPage},{id:"voting",l:"Voting",C:VotingPage}];const P=pages.find(p=>p.id===pg)?.C||HomePage;return<><nav className="nav"><div className="nav-in"><span className="nav-logo" onClick={()=>setPg("home")}>NSC Stats</span>{pages.map(p=><button key={p.id} className={`nl ${pg===p.id?"on":""}`} onClick={()=>setPg(p.id)}>{p.l}</button>)}<a href="https://nationsongcontest.miraheze.org" target="_blank" rel="noreferrer" className="nl" style={{marginLeft:"auto",fontSize:12}}>Wiki ↗</a></div></nav><P key={pg}/><footer style={{textAlign:"center",padding:"32px 24px",borderTop:"1px solid rgba(255,255,255,0.04)",fontSize:12,color:"rgba(255,255,255,0.15)"}}>NSC Statistics · Data from <a href="https://nationsongcontest.miraheze.org" style={{color:"rgba(255,215,0,0.4)"}}>nscwiki.com</a> · Updated every 14 days</footer></>;}
