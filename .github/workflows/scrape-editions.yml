# Scrape specific editions and merge into existing history
# Manual trigger only. For re-scraping corrected editions or adding new ones.

name: "Scrape Editions"

on:
  workflow_dispatch:
    inputs:
      editions:
        description: 'Edition numbers (space-separated, e.g. "243 245 247")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check for existing history
        run: |
          if [ -f scripts/data/nsc_all_history.json ]; then
            echo "✅ Found existing history — will merge incrementally"
            python3 -c "
          import json
          with open('scripts/data/nsc_all_history.json') as f:
              d = json.load(f)
          eds = sorted(set(r['Edition'] for r in d))
          print(f'  Existing: {len(d)} rows, {len(eds)} editions (#{eds[0]}-#{eds[-1]})')
          "
          else
            echo "⚠️ No existing history found — run Full Rebuild first for best results"
            echo "  Will scrape only the specified editions"
            mkdir -p scripts/data
          fi

      - name: Scrape specified editions
        run: |
          cd scripts
          python nsc_scraper.py --editions ${{ inputs.editions }} --output ./data --delay 0.8

      - name: Generate site data
        run: |
          cd scripts
          python generate_site_data.py \
            --history ./data/nsc_all_history.json \
            --roster ./data/NSCRoster.xlsx --output ../public/data/

      - name: Show results
        run: |
          echo "=== Scraped editions: ${{ inputs.editions }} ==="
          ls -lh public/data/
          python3 -c "
          import json
          with open('scripts/data/nsc_all_history.json') as f:
              d = json.load(f)
          eds = sorted(set(r['Edition'] for r in d))
          print(f'History now: {len(d)} rows, {len(eds)} editions (#{eds[0]}-#{eds[-1]})')
          "

      - name: Commit and push
        run: |
          git config user.name "NSC Stats Bot"
          git config user.email "nscstats-bot@users.noreply.github.com"
          git add public/data/ scripts/data/nsc_all_history.json
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            EDITIONS="${{ inputs.editions }}"
            git commit -m "📝 Rescrape editions: ${EDITIONS}"
            git push
            echo "✅ Pushed — Vercel will auto-deploy"
          fi
