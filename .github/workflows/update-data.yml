# Full NSC Wiki Scrape + Site Data Regeneration
# Runs automatically every Monday. Can also be triggered manually.
# Vercel auto-deploys on each commit.

name: "Full Rebuild"

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 04:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape wiki (full rebuild)
        run: |
          mkdir -p scripts/data
          cd scripts
          python nsc_scraper.py --full-rebuild --output ./data --delay 0.8

      - name: Generate site data
        run: |
          cd scripts
          python generate_site_data.py \
            --history ./data/nsc_all_history.json \
            --roster ./data/NSCRoster.xlsx --output ../public/data/

      - name: Show results
        run: |
          echo "=== Data files ==="
          ls -lh public/data/
          echo ""
          python3 -c "
          import json
          with open('public/data/homepage.json') as f:
              d = json.load(f)
          s = d['s']
          print(f'Editions: {s[\"te\"]}')
          print(f'Nations: {s[\"tn\"]}')
          print(f'GF entries: {s[\"gf\"]}')
          print(f'Latest winner: #{s[\"le\"]} {s[\"lw\"]}')
          "

      - name: Commit and push
        run: |
          git config user.name "NSC Stats Bot"
          git config user.email "nscstats-bot@users.noreply.github.com"
          git add public/data/ scripts/data/nsc_all_history.json
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 Full rebuild: ${TIMESTAMP}"
            git push
            echo "✅ Data committed and pushed — Vercel will auto-deploy"
          fi
