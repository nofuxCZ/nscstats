# Regenerate site data files from existing history (no wiki scraping)
# Use after updating generate_site_data.py to apply new stats/fixes.

name: "Regenerate Data"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check history exists
        run: |
          if [ ! -f scripts/data/nsc_all_history.json ]; then
            echo "❌ No history file found at scripts/data/nsc_all_history.json"
            echo "   Run 'Full Rebuild' first to create the history file."
            exit 1
          fi
          python3 -c "
          import json
          with open('scripts/data/nsc_all_history.json') as f:
              d = json.load(f)
          eds = sorted(set(r['Edition'] for r in d))
          print(f'History: {len(d)} rows, {len(eds)} editions (#{eds[0]}-#{eds[-1]})')
          "

      - name: Generate site data
        run: |
          cd scripts
          python generate_site_data.py \
            --history ./data/nsc_all_history.json \
            --roster ./data/NSCRoster.xlsx --output ../public/data/

      - name: Show results
        run: |
          echo "=== Regenerated data files ==="
          ls -lh public/data/
          python3 -c "
          import json
          with open('public/data/homepage.json') as f:
              d = json.load(f)
          s = d['s']
          print(f'Editions: {s[\"te\"]}')
          print(f'Nations: {s[\"tn\"]}')
          print(f'GF entries: {s[\"gf\"]}')
          print(f'Latest winner: #{s[\"le\"]} {s[\"lw\"]}')
          "

      - name: Commit and push
        run: |
          git config user.name "NSC Stats Bot"
          git config user.email "nscstats-bot@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔧 Regenerate data: ${TIMESTAMP}"
            git push
            echo "✅ Pushed — Vercel will auto-deploy"
          fi
